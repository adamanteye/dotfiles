<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>LXGW WenKai TC</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>LXGW WenKai TC</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Inconsolata</family>
      <family>LXGW WenKai TC</family>
    </prefer>
  </alias>
</fontconfig>
